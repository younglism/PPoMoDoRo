<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>뽀모도로 타이머</title>
<meta name="description" content="토마토와 함께하는 귀여운 뽀모도로 집중 타이머 🍅" />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#E8493A" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="뽀모도로" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<!-- 토마토 파비콘 -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cellipse cx='50' cy='58' rx='34' ry='30' fill='%23E8493A'/%3E%3Cpath d='M50 22 L53.5 31.1 L63.3 31.7 L55.7 37.9 L58.2 47.3 L50 51 L41.8 47.3 L44.3 37.9 L36.7 31.7 L46.5 31.1 Z' fill='%234FA84A'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet" />
<style>
  :root{
    --tomato:#E8493A;  --tomato-deep:#C6362B;
    --rest:#4FAE78;    --rest-deep:#3B8E63;
    --sun:#F2A93C;     --sun-deep:#DB8E1B;
    --bg:#FEF4EC;      --bg2:#FBE7D8;
    --card:#FFFFFF;
    --ink:#43302B;     --muted:#8A6656;
    --track:#F2E2D7;
    --shadow:0 22px 46px -24px rgba(150,60,40,.42);
    --accent:var(--tomato); --accent-deep:var(--tomato-deep);
    --tomato-body:var(--tomato); --tomato-body-deep:var(--tomato-deep);
  }
  /* 상태별 테마: 토마토가 상태에 따라 익어요 */
  body[data-phase="focus"]{ --accent:var(--tomato); --accent-deep:var(--tomato-deep); --tomato-body:#EC4E3F; --tomato-body-deep:#C6362B; }
  body[data-phase="short"]{ --accent:var(--rest);   --accent-deep:var(--rest-deep);  --tomato-body:#79C285; --tomato-body-deep:#4FA85F; }
  body[data-phase="long"] { --accent:var(--sun);    --accent-deep:var(--sun-deep);   --tomato-body:#F4B14A; --tomato-body-deep:#DB8E1B; }

  *{ box-sizing:border-box; }
  [hidden]{ display:none !important; }
  html{ background:var(--bg); }
  body{
    margin:0;
    font-family:"Gowun Dodum", system-ui, -apple-system, sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1100px 800px at 50% -10%, #FFFBF7 0%, transparent 60%),
      radial-gradient(900px 600px at 110% 110%, var(--bg2) 0%, transparent 60%),
      var(--bg);
    background-attachment:fixed;
    min-height:100dvh;
    display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
    padding:28px 16px 44px;
    overflow-x:hidden;
    transition:background .6s ease;
  }
  /* 화면이 충분히 크면 시각적으로 가운데 정렬 (넘칠 땐 위부터) */
  .wrap{ margin:auto 0; }

  /* 배경 넝쿨 토마토 장식 */
  .vine{ position:fixed; pointer-events:none; opacity:.13; z-index:0; }
  .vine.tl{ top:-24px; left:-40px; width:230px; transform:rotate(-10deg); }
  .vine.br{ bottom:-30px; right:-44px; width:250px; transform:rotate(170deg); }
  /* 흩뿌린 일반 토마토 */
  .tomato-deco{ position:fixed; pointer-events:none; z-index:0; opacity:.12; }
  .tomato-deco.d1{ width:70px; top:20%; left:3%; transform:rotate(-12deg); }
  .tomato-deco.d2{ width:52px; top:64%; left:6%; transform:rotate(14deg); }
  .tomato-deco.d3{ width:60px; top:32%; right:4%; transform:rotate(10deg); }
  @media (max-width:520px){
    .tomato-deco.d1,.tomato-deco.d3{ display:none; }
    .tomato-deco.d2{ opacity:.09; }
  }

  .wrap{ position:relative; z-index:1; width:100%; max-width:430px; }

  header{ text-align:center; margin-bottom:14px; }
  .logo{
    font-family:"Jua", sans-serif; font-size:36px; letter-spacing:.5px;
    color:var(--ink); display:inline-flex; align-items:center; gap:8px; line-height:1;
  }
  .logo svg{ width:38px; height:38px; }
  .tagline{ margin:6px 0 0; font-size:13.5px; color:var(--muted); }

  .card{
    background:var(--card); border-radius:30px; padding:26px 24px 24px;
    box-shadow:var(--shadow); border:1px solid #F6E7DC;
  }

  .badge{
    display:flex; justify-content:center; margin-bottom:6px;
  }
  .badge span{
    font-size:14px; font-weight:400; letter-spacing:.12em;
    padding:7px 16px; border-radius:999px;
    color:#fff; background:var(--accent);
    box-shadow:0 6px 16px -8px var(--accent-deep);
    transition:background .5s ease;
  }

  /* 다이얼 */
  .dial-wrap{ position:relative; width:min(300px,78vw); aspect-ratio:1; margin:8px auto 4px; }
  .dial{ width:100%; height:100%; display:block; }
  .track-ring{ fill:none; stroke:var(--track); stroke-width:15; }
  .progress-ring{
    fill:none; stroke:var(--accent); stroke-width:15; stroke-linecap:round;
    transform:rotate(-90deg); transform-origin:140px 140px;
    transition:stroke-dashoffset .25s linear, stroke .5s ease;
  }
  .no-anim{ transition:none !important; }
  .tomato-body{ fill:var(--tomato-body); transition:fill .5s ease; }
  .tomato-body-deep{ fill:var(--tomato-body-deep); transition:fill .5s ease; }
  .calyx{ fill:#4FA84A; }
  .calyx-deep{ fill:#3C8B3A; }
  .stem{ stroke:#7C5A32; }
  .shine{ fill:#ffffff; opacity:.34; }

  .readout{
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; pointer-events:none;
    transform:translateY(6px);
  }
  .time{ font-family:"Jua",sans-serif; font-size:clamp(46px,15vw,64px); color:#fff; line-height:1;
    text-shadow:0 3px 0 rgba(0,0,0,.10); font-variant-numeric:tabular-nums; }
  .phase-hint{ margin-top:6px; font-size:13px; color:#fff; opacity:.9; }

  /* 4-토마토 사이클 트래커 */
  .tracker{ display:flex; justify-content:center; gap:14px; margin:2px 0 16px; }
  .slot{ width:34px; height:34px; transition:transform .3s cubic-bezier(.34,1.56,.64,1); }
  .slot svg{ width:100%; height:100%; }
  .slot .fill{ fill:#EFDDD3; transition:fill .35s ease; }
  .slot .fill-deep{ fill:#E3C9BB; }
  .slot .cx-leaf{ fill:#CDBBAF; }
  .slot.done .fill{ fill:var(--tomato); }
  .slot.done .fill-deep{ fill:var(--tomato-deep); }
  .slot.done .cx-leaf{ fill:#4FA84A; }
  .slot.pop{ animation:pop .5s cubic-bezier(.34,1.56,.64,1); }
  @keyframes pop{ 0%{transform:scale(.4) rotate(-12deg);} 60%{transform:scale(1.22) rotate(6deg);} 100%{transform:scale(1);} }
  .set-label{ text-align:center; font-size:13px; color:var(--muted); margin:16px 0 9px; }
  .set-count{ font-family:"Jua",sans-serif; color:var(--tomato); font-size:15px; letter-spacing:.5px; margin-left:2px; }

  /* 컨트롤 */
  .controls{ display:flex; flex-direction:column; gap:10px; }
  button{ font-family:"Gowun Dodum",sans-serif; cursor:pointer; border:none; }
  button:focus-visible{ outline:3px solid var(--accent); outline-offset:3px; }

  .btn-primary{
    width:100%; padding:16px; border-radius:18px; font-size:19px; color:#fff;
    background:var(--accent); box-shadow:0 12px 22px -12px var(--accent-deep);
    font-family:"Jua",sans-serif; letter-spacing:.5px;
    transition:transform .1s ease, background .5s ease, box-shadow .3s ease;
  }
  .btn-primary:hover{ filter:brightness(1.04); }
  .btn-primary:active{ transform:translateY(2px); }

  /* 리셋 / 건너뛰기 — 구분선 한 블럭 */
  .seg-block{
    display:flex; align-items:stretch; overflow:hidden;
    border-radius:16px; background:#F4E5D8; border:1.5px solid #E3C6B3;
  }
  .seg-block button{
    flex:1; padding:13px 4px; color:var(--ink); background:transparent;
    font-family:"Gowun Dodum",sans-serif; font-size:15.5px;
    transition:background .15s ease;
  }
  .seg-block button + button{ border-left:1.5px solid #E3C6B3; }
  .seg-block button:hover{ background:#EBD8C7; }
  .seg-block button:active{ background:#E3CDBA; }

  /* 긴 휴식 통합 영역 */
  .long-zone{ margin-top:2px; }
  /* 기본(활성): 초록 세그먼트 버튼 */
  .long-ready{
    display:flex; align-items:stretch; overflow:hidden;
    border-radius:16px; background:var(--rest);
    box-shadow:0 12px 22px -12px var(--rest-deep);
    animation:glow 1.8s ease-in-out infinite;
  }
  .long-ready .lr-label{
    display:flex; align-items:center; gap:6px; padding:0 16px; color:#fff; white-space:nowrap;
    background:var(--rest-deep); font-family:"Jua",sans-serif; font-size:15px; letter-spacing:.3px;
  }
  .long-ready button{
    flex:1; padding:14px 4px; color:#fff; background:transparent;
    font-family:"Jua",sans-serif; font-size:17px; letter-spacing:.5px;
    border-left:1.5px solid rgba(255,255,255,.5); transition:background .15s ease;
  }
  .long-ready button:hover{ background:rgba(255,255,255,.16); }
  .long-ready button:active{ background:rgba(255,255,255,.3); }
  .long-ready .lock-ico{ display:none; }

  /* 잠김: 위 리셋/건너뛰기 블럭과 동일한 중립 톤 */
  .long-ready.locked{
    background:#F4E5D8; border:1.5px solid #E3C6B3; box-shadow:none; animation:none; cursor:not-allowed;
  }
  .long-ready.locked .lr-label{ background:transparent; color:#A38D7C; }
  .long-ready.locked button{ color:#B4A08F; border-left-color:#E3C6B3; pointer-events:none; }
  .long-ready.locked .lock-ico{ display:inline-block; width:14px; height:14px; opacity:.9; }

  .long-active{
    width:100%; padding:13px; border-radius:16px; font-size:15px; text-align:center;
    font-family:"Gowun Dodum",sans-serif; color:var(--rest-deep);
    background:#EAF5EE; border:1.5px solid #C4E4D3;
  }
  @keyframes glow{ 0%,100%{ box-shadow:0 12px 22px -12px var(--rest-deep);} 50%{ box-shadow:0 0 0 5px rgba(79,174,120,.30), 0 12px 22px -12px var(--rest-deep);} }

  /* 안내 문구 */
  .notice{
    margin:14px 2px 0; padding:11px 14px; border-radius:14px;
    background:#FFF6EE; border:1px dashed #E7C6AE;
    font-size:13px; color:#75513F; text-align:center; line-height:1.6;
  }
  .notice b{ color:var(--ink); font-weight:400; font-family:"Jua",sans-serif; }

  /* 미니 창(PIP) 버튼 */
  .pip-open{
    width:100%; margin-top:12px; padding:12px; border-radius:14px; font-size:14.5px;
    color:var(--accent-deep); background:#FBEEE4; border:1.5px solid #E6C9B7;
    font-family:"Gowun Dodum",sans-serif; cursor:pointer; transition:background .15s ease, border-color .15s ease;
  }
  .pip-open:hover{ background:#F5E2D4; border-color:#DAB49E; }
  .pip-open:active{ transform:translateY(1px); }
  .pip-open.on{ background:var(--accent); color:#fff; border-color:transparent; }

  /* 오늘 기록 */
  .today{ margin-top:16px; text-align:center; font-size:14.5px; color:var(--ink); }
  .today .count{ font-family:"Jua",sans-serif; color:var(--tomato); font-size:20px; }
  .reset-day{ display:inline-block; margin-top:6px; font-size:12px; color:var(--muted);
    background:none; padding:2px 6px; text-decoration:underline; text-underline-offset:2px; }

  /* 설정 */
  .settings-toggle{ display:block; margin:18px auto 0; font-size:13px; color:var(--muted);
    background:none; }
  .settings{ margin-top:12px; padding:16px; border-radius:18px; background:#FBF1EA;
    border:1px solid #F1E0D5; display:none; }
  .settings.open{ display:block; }
  .settings h3{ margin:0 0 12px; font-size:14px; color:var(--ink); font-weight:400; text-align:center; }
  .set-row{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .set-row:last-child{ margin-bottom:0; }
  .set-row label{ font-size:14px; color:var(--ink); }
  .stepper{ display:flex; align-items:center; gap:10px; }
  .stepper button{ width:30px; height:30px; border-radius:9px; background:#fff; border:1px solid #E9D6C9;
    font-size:18px; line-height:1; color:var(--ink); font-family:"Jua",sans-serif; }
  .stepper button:active{ transform:translateY(1px); }
  .stepper .val{ min-width:52px; text-align:center; font-family:"Jua",sans-serif; font-size:16px; }
  .stepper .val small{ font-family:"Gowun Dodum"; font-size:11px; color:var(--muted); }

  .foot{ text-align:center; margin-top:22px; font-size:12.5px; color:#6E4C3C; }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; }
    .progress-ring{ transition:stroke .3s ease; }
  }
</style>
</head>
<body data-phase="focus">

  <!-- 배경 넝쿨 장식 (토마토 주렁주렁) -->
  <svg class="vine tl" viewBox="0 0 160 160" aria-hidden="true">
    <path d="M10 6 Q46 30 40 60 M60 4 Q72 40 78 72 M96 10 Q104 46 120 66 M30 40 Q70 52 100 44" stroke="#4FA84A" stroke-width="5" fill="none" stroke-linecap="round"/>
    <g>
      <g transform="translate(40,66)"><ellipse cx="0" cy="0" rx="19" ry="17" fill="#E8493A"/><ellipse cx="-6" cy="-6" rx="5" ry="3" fill="#fff" opacity=".4"/><path d="M0 -17 l4 8 l9 .6 l-6 5 l2 8 l-9 -4 l-9 4 l2 -8 l-6 -5 l9 -.6 Z" fill="#4FA84A"/></g>
      <g transform="translate(80,80)"><ellipse cx="0" cy="0" rx="15" ry="13" fill="#F0533F"/><ellipse cx="-4" cy="-5" rx="4" ry="2.5" fill="#fff" opacity=".4"/><path d="M0 -13 l3 6 l7 .5 l-5 4 l1.5 6 l-6.5 -3 l-6.5 3 l1.5 -6 l-5 -4 l7 -.5 Z" fill="#4FA84A"/></g>
      <g transform="translate(118,66)"><ellipse cx="0" cy="0" rx="13" ry="12" fill="#E8493A"/><path d="M0 -12 l3 5.5 l6.5 .4 l-4.5 3.6 l1.4 5.5 l-6.4 -2.8 l-6.4 2.8 l1.4 -5.5 l-4.5 -3.6 l6.5 -.4 Z" fill="#4FA84A"/></g>
    </g>
  </svg>
  <svg class="vine br" viewBox="0 0 160 160" aria-hidden="true">
    <path d="M6 8 Q40 26 44 58 M56 6 Q66 40 80 70 M100 10 Q112 40 118 72 M36 46 Q74 58 104 50" stroke="#4FA84A" stroke-width="5" fill="none" stroke-linecap="round"/>
    <g>
      <g transform="translate(44,64)"><ellipse cx="0" cy="0" rx="20" ry="18" fill="#E8493A"/><ellipse cx="-6" cy="-6" rx="5" ry="3" fill="#fff" opacity=".4"/><path d="M0 -18 l4 8 l9 .6 l-6 5 l2 8 l-9 -4 l-9 4 l2 -8 l-6 -5 l9 -.6 Z" fill="#4FA84A"/></g>
      <g transform="translate(82,78)"><ellipse cx="0" cy="0" rx="15" ry="13" fill="#F0533F"/><ellipse cx="-4" cy="-5" rx="4" ry="2.5" fill="#fff" opacity=".4"/><path d="M0 -13 l3 6 l7 .5 l-5 4 l1.5 6 l-6.5 -3 l-6.5 3 l1.5 -6 l-5 -4 l7 -.5 Z" fill="#4FA84A"/></g>
      <g transform="translate(116,74)"><ellipse cx="0" cy="0" rx="13" ry="12" fill="#E8493A"/><path d="M0 -12 l3 5.5 l6.5 .4 l-4.5 3.6 l1.4 5.5 l-6.4 -2.8 l-6.4 2.8 l1.4 -5.5 l-4.5 -3.6 l6.5 -.4 Z" fill="#4FA84A"/></g>
    </g>
  </svg>
  <!-- 흩뿌린 일반 토마토 -->
  <svg class="tomato-deco d1" viewBox="0 0 100 100" aria-hidden="true"><ellipse cx="50" cy="58" rx="34" ry="30" fill="#E8493A"/><ellipse cx="40" cy="49" rx="8" ry="4.5" fill="#fff" opacity=".35"/><path d="M50 22 L53.5 31.1 L63.3 31.7 L55.7 37.9 L58.2 47.3 L50 51 L41.8 47.3 L44.3 37.9 L36.7 31.7 L46.5 31.1 Z" fill="#4FA84A"/></svg>
  <svg class="tomato-deco d2" viewBox="0 0 100 100" aria-hidden="true"><ellipse cx="50" cy="58" rx="34" ry="30" fill="#F0533F"/><ellipse cx="40" cy="49" rx="8" ry="4.5" fill="#fff" opacity=".35"/><path d="M50 22 L53.5 31.1 L63.3 31.7 L55.7 37.9 L58.2 47.3 L50 51 L41.8 47.3 L44.3 37.9 L36.7 31.7 L46.5 31.1 Z" fill="#4FA84A"/></svg>
  <svg class="tomato-deco d3" viewBox="0 0 100 100" aria-hidden="true"><ellipse cx="50" cy="58" rx="34" ry="30" fill="#E8493A"/><ellipse cx="40" cy="49" rx="8" ry="4.5" fill="#fff" opacity=".35"/><path d="M50 22 L53.5 31.1 L63.3 31.7 L55.7 37.9 L58.2 47.3 L50 51 L41.8 47.3 L44.3 37.9 L36.7 31.7 L46.5 31.1 Z" fill="#4FA84A"/></svg>

  <div class="wrap">
    <header>
      <div class="logo">
        <svg viewBox="0 0 100 100" aria-hidden="true">
          <ellipse cx="50" cy="58" rx="34" ry="30" fill="#E8493A"/>
          <ellipse cx="40" cy="50" rx="8" ry="5" fill="#fff" opacity=".35"/>
          <path d="M50 20 L53.5 29.1 L63.3 29.7 L55.7 35.9 L58.2 45.3 L50 49 L41.8 45.3 L44.3 35.9 L36.7 29.7 L46.5 29.1 Z" fill="#4FA84A"/>
          <path d="M50 24 Q48 16 53 13" stroke="#7C5A32" stroke-width="4" fill="none" stroke-linecap="round"/>
        </svg>
        뽀모도로
      </div>
      <p class="tagline">25분 집중 · 5분 휴식</p>
    </header>

    <div class="card">
      <div class="badge"><span id="phaseBadge">집중 시간</span></div>

      <!-- 다이얼 + 토마토 -->
      <div class="dial-wrap">
        <svg class="dial" viewBox="0 0 280 280" aria-hidden="true">
          <circle class="track-ring" cx="140" cy="140" r="120"/>
          <circle id="ring" class="progress-ring" cx="140" cy="140" r="120"/>
          <!-- 큰 토마토 -->
          <g>
            <path class="stem" d="M140 78 Q136 60 145 54" stroke-width="6" fill="none" stroke-linecap="round"/>
            <ellipse class="tomato-body-deep" cx="140" cy="152" rx="82" ry="74"/>
            <ellipse class="tomato-body" cx="140" cy="148" rx="80" ry="72"/>
            <ellipse class="shine" cx="112" cy="120" rx="24" ry="15" transform="rotate(-24 112 120)"/>
            <path class="calyx-deep" d="M140 64 L149 87 L173.5 88.5 L155.5 103 L161.5 127 L140 114 L118.5 127 L124.5 103 L106.5 88.5 L131 87 Z"/>
            <path class="calyx" d="M140 62 L148.8 83.9 L172.3 85.5 L154.3 100.6 L160 123.5 L140 111 L120 123.5 L125.7 100.6 L107.7 85.5 L131.2 83.9 Z"/>
          </g>
        </svg>
        <div class="readout">
          <div class="time" id="time" aria-live="polite">25:00</div>
          <div class="phase-hint" id="phaseHint">집중해볼까요?</div>
        </div>
      </div>

      <!-- 4-토마토 트래커 -->
      <p class="set-label" id="setLabel">이번 세트 사이클 <span class="set-count">0 / 4</span></p>
      <div class="tracker" id="tracker" aria-label="현재 세트 진행도"></div>

      <!-- 컨트롤 -->
      <div class="controls">
        <button class="btn-primary" id="startBtn">시작</button>
        <div class="seg-block" role="group" aria-label="타이머 제어">
          <button type="button" id="resetBtn">리셋</button>
          <button type="button" id="skipBtn">건너뛰기</button>
        </div>
        <div class="long-zone" id="longZone">
          <div class="long-ready locked" id="longReady" role="group" aria-label="긴 휴식 시작" aria-disabled="true">
            <span class="lr-label"><svg class="lock-ico" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 11V7.5a5 5 0 0 1 10 0V11" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/><rect x="4.5" y="10.5" width="15" height="10.5" rx="3" fill="currentColor"/></svg>긴 휴식</span>
            <button type="button" data-min="15">15분</button>
            <button type="button" data-min="30">30분</button>
          </div>
          <div class="long-active" id="longActive" hidden>🍅 긴 휴식 중이에요</div>
        </div>
      </div>

      <p class="notice" id="notice"></p>

      <button class="pip-open" id="pipBtn" hidden>🪟 미니 창으로 띄우기</button>
    </div>

    <div class="today">
      오늘 <span class="count" id="todayCount">0</span> 뽀모도로 완료 🍅<br/>
      <button class="reset-day" id="resetDayBtn">처음부터 다시 시작</button>
    </div>

    <button class="settings-toggle" id="settingsToggle">⚙️ 시간 설정</button>
    <div class="settings" id="settings">
      <h3>타이머 시간 (분)</h3>
      <div class="set-row">
        <label>집중</label>
        <div class="stepper" data-key="focus">
          <button data-d="-1" aria-label="집중 시간 줄이기">−</button>
          <div class="val"><span data-val>25</span><small>분</small></div>
          <button data-d="1" aria-label="집중 시간 늘리기">+</button>
        </div>
      </div>
      <div class="set-row">
        <label>짧은 휴식</label>
        <div class="stepper" data-key="short">
          <button data-d="-1" aria-label="짧은 휴식 줄이기">−</button>
          <div class="val"><span data-val>5</span><small>분</small></div>
          <button data-d="1" aria-label="짧은 휴식 늘리기">+</button>
        </div>
      </div>
    </div>

    <p class="foot">스페이스바 = 시작/일시정지 · R = 리셋</p>
  </div>

<script>
(function(){
  "use strict";

  // ── 상태 ─────────────────────────────────────────────
  var CYCLES_PER_SET = 4;              // 긴 휴식까지 필요한 사이클 수
  var dur = { focus:25*60, short:5*60, long:30*60 };  // 초 단위

  // 오늘 기록 저장 (날짜가 바뀌면 자동 0). 저장 불가 환경에선 조용히 메모리만 사용
  var STORE_KEY = "ppomodoro-today";
  function todayStr(){ var d=new Date(); return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); }
  function loadToday(){
    try{
      var raw = localStorage.getItem(STORE_KEY);
      if(!raw) return 0;
      var o = JSON.parse(raw);
      return (o && o.date === todayStr()) ? (o.count|0) : 0;
    }catch(e){ return 0; }
  }
  function saveToday(count){
    try{ localStorage.setItem(STORE_KEY, JSON.stringify({ date: todayStr(), count: count })); }catch(e){}
  }

  var state = {
    phase:"focus",     // focus | short | long
    remaining:dur.focus,
    running:false,
    cyclesInSet:0,     // 이번 세트에서 완료한 사이클 (0~4)
    todayTotal:loadToday()   // 오늘 완료한 뽀모도로 총합 (저장된 값 복원)
  };

  var PHASE_INFO = {
    focus:{ label:"집중 시간", hint:"집중해볼까요?", tab:"집중 🍅" },
    short:{ label:"짧은 휴식", hint:"5분간 쉬어가요", tab:"휴식 🌿" },
    long:{  label:"긴 휴식",  hint:"푹 쉬는 시간이에요", tab:"긴 휴식 ☀️" }
  };

  var C = 2 * Math.PI * 120;           // 링 둘레
  var timerId = null, endAt = 0;

  // ── DOM ─────────────────────────────────────────────
  var $ = function(id){ return document.getElementById(id); };
  var ring=$("ring"), timeEl=$("time"), badge=$("phaseBadge"), hint=$("phaseHint");
  var tracker=$("tracker"), setLabel=$("setLabel"), notice=$("notice");
  var startBtn=$("startBtn"), resetBtn=$("resetBtn"), skipBtn=$("skipBtn");
  var longReady=$("longReady"), longActive=$("longActive");
  var todayCount=$("todayCount"), resetDayBtn=$("resetDayBtn");
  var settingsToggle=$("settingsToggle"), settings=$("settings");
  var pipBtn=$("pipBtn");

  ring.style.strokeDasharray = C;

  // 트래커용 작은 토마토 SVG
  function tomatoSlot(){
    return '<div class="slot" role="img">'
      + '<svg viewBox="0 0 100 100">'
      + '<ellipse class="fill-deep" cx="50" cy="60" rx="34" ry="30"/>'
      + '<ellipse class="fill" cx="50" cy="57" rx="33" ry="29"/>'
      + '<ellipse cx="40" cy="49" rx="7" ry="4.5" fill="#fff" opacity=".3"/>'
      + '<path class="cx-leaf" d="M50 22 L53.5 31.1 L63.3 31.7 L55.7 37.9 L58.2 47.3 L50 51 L41.8 47.3 L44.3 37.9 L36.7 31.7 L46.5 31.1 Z"/>'
      + '</svg></div>';
  }
  (function buildTracker(){
    var html="";
    for(var i=0;i<CYCLES_PER_SET;i++) html += tomatoSlot();
    tracker.innerHTML = html;
  })();

  // ── 오디오 (자체 생성 알림음, 외부 파일 없음) ───────────
  var actx = null;
  function chime(kind){
    try{
      if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)();
      var now = actx.currentTime;
      var notes = kind==="long" ? [523.25,659.25,783.99,1046.5] : [659.25,880];
      notes.forEach(function(f,i){
        var o=actx.createOscillator(), g=actx.createGain();
        o.type="sine"; o.frequency.value=f;
        o.connect(g); g.connect(actx.destination);
        var t=now+i*0.14;
        g.gain.setValueAtTime(0,t);
        g.gain.linearRampToValueAtTime(0.22,t+0.02);
        g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
        o.start(t); o.stop(t+0.55);
      });
    }catch(e){}
  }

  // ── 렌더 ─────────────────────────────────────────────
  function fmt(sec){
    var m=Math.floor(sec/60), s=sec%60;
    return (m<10?"0":"")+m+":"+(s<10?"0":"")+s;
  }
  function setRing(frac, animate){
    if(!animate) ring.classList.add("no-anim");
    ring.style.strokeDashoffset = C*(1-frac);
    if(!animate){ ring.offsetWidth; ring.classList.remove("no-anim"); }
  }
  function render(animateRing){
    document.body.setAttribute("data-phase", state.phase);
    var info = PHASE_INFO[state.phase];
    var total = dur[state.phase];
    timeEl.textContent = fmt(state.remaining);
    badge.textContent = info.label;
    hint.textContent = state.running ? info.hint : (state.phase==="focus" ? "집중해볼까요?" : info.hint);
    setRing(total>0 ? state.remaining/total : 0, animateRing!==false);

    // 트래커
    var slots = tracker.children;
    for(var i=0;i<slots.length;i++){
      slots[i].classList.toggle("done", i < state.cyclesInSet);
    }
    setLabel.innerHTML = "이번 세트 사이클 <span class=\"set-count\">" + state.cyclesInSet + " / " + CYCLES_PER_SET + "</span>";

    // 시작 버튼
    startBtn.textContent = state.running ? "일시정지" : (state.remaining < total ? "이어서" : "시작");

    // 긴 휴식 버튼 + 안내 문구
    var unlocked = state.cyclesInSet >= CYCLES_PER_SET;
    var inLong = state.phase==="long";
    // 긴 휴식 블럭: 긴 휴식 중이 아닐 땐 항상 보이되, 잠김(중립)↔활성(초록) 전환
    longReady.hidden = inLong;
    longReady.classList.toggle("locked", !unlocked);
    longReady.setAttribute("aria-disabled", unlocked ? "false" : "true");
    longActive.hidden = !inLong;

    if(state.phase==="long"){
      notice.innerHTML = "푹 쉬어가세요 🌙 <b>"+Math.round(dur.long/60)+"분</b> 뒤 새로운 세트를 시작해요.";
    } else if(unlocked){
      notice.innerHTML = "🎉 <b>"+CYCLES_PER_SET+" 뽀모도로</b> 완료! 15분·30분 중 골라 긴 휴식을 시작하세요.";
    } else {
      var left = CYCLES_PER_SET - state.cyclesInSet;
      notice.innerHTML = "뽀모도로 규칙 🍅 <b>"+CYCLES_PER_SET+" 사이클</b>을 완료하면 긴 휴식이 열려요.<br>"
        + "앞으로 <b>"+left+"</b> 사이클 남았어요 ("+state.cyclesInSet+"/"+CYCLES_PER_SET+").";
    }

    todayCount.textContent = state.todayTotal;

    // 탭 제목
    document.title = state.running
      ? fmt(state.remaining)+" · "+info.tab+" | 뽀모도로"
      : "뽀모도로 타이머";

    updatePip();
  }

  // ── 타이머 엔진 ───────────────────────────────────────
  function loop(){
    var now = Date.now();
    var rem = Math.round((endAt - now)/1000);
    if(rem <= 0){
      state.remaining = 0; render();
      completePhase();
      return;
    }
    if(rem !== state.remaining){ state.remaining = rem; render(); }
  }
  function start(){
    if(state.running) return;
    if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
    state.running = true;
    endAt = Date.now() + state.remaining*1000;
    timerId = setInterval(loop, 200);
    render();
  }
  function pause(){
    if(!state.running) return;
    state.running = false;
    clearInterval(timerId); timerId=null;
    render();
  }
  function toggle(){ state.running ? pause() : start(); }

  function goPhase(phase, autoStart){
    state.phase = phase;
    state.remaining = dur[phase];
    clearInterval(timerId); timerId=null;
    state.running = false;
    render(false);
    if(autoStart) start();
  }

  // 사이클 트래커 팝 애니메이션
  function popSlot(index){
    var slot = tracker.children[index];
    if(!slot) return;
    slot.classList.add("pop");
    setTimeout(function(){ slot.classList.remove("pop"); }, 520);
  }

  function completePhase(){
    if(state.phase==="focus"){
      chime("short");
      // 집중 끝 → 짧은 휴식 (이어서 자동 진행)
      goPhase("short", true);
    } else if(state.phase==="short"){
      // 짧은 휴식 끝 → 1 사이클(1 뽀모도로) 완료
      state.cyclesInSet++;
      state.todayTotal++;
      saveToday(state.todayTotal);
      var reachedSet = state.cyclesInSet >= CYCLES_PER_SET;
      chime(reachedSet ? "long" : "short");
      goPhase("focus", !reachedSet);   // 4 사이클 채우면 멈추고 긴 휴식 유도
      popSlot(state.cyclesInSet-1);
    } else { // long
      chime("long");
      state.cyclesInSet = 0;           // 세트 리셋 → 토마토 4개 비움
      goPhase("focus", false);
    }
  }

  // ── 버튼 동작 ────────────────────────────────────────
  startBtn.addEventListener("click", toggle);
  resetBtn.addEventListener("click", function(){
    pause();
    state.remaining = dur[state.phase];
    render(false);
  });
  skipBtn.addEventListener("click", function(){
    // 현재 구간을 완료 처리하고 다음으로
    completePhase();
  });
  // 긴 휴식: 활성화되면 버튼 안에서 15분/30분을 골라 바로 시작
  longReady.addEventListener("click", function(e){
    var b = e.target.closest("button"); if(!b) return;
    if(state.cyclesInSet < CYCLES_PER_SET) return;   // 아직 잠김
    dur.long = parseInt(b.getAttribute("data-min"),10)*60;
    goPhase("long", true);
  });
  resetDayBtn.addEventListener("click", function(){
    state.cyclesInSet = 0;      // 세트 사이클 리셋
    state.todayTotal = 0;       // 오늘 기록 리셋
    saveToday(0);               // 저장된 기록도 초기화
    goPhase("focus", false);    // 타이머·상태를 맨 처음(집중 25:00·정지)으로
  });

  // 키보드
  document.addEventListener("keydown", function(e){
    var tag = (e.target.tagName||"").toLowerCase();
    if(tag==="input"||tag==="textarea") return;
    if(e.code==="Space"){ e.preventDefault(); toggle(); }
    else if(e.key==="r"||e.key==="R"){ resetBtn.click(); }
  });

  // ── 설정 ─────────────────────────────────────────────
  settingsToggle.addEventListener("click", function(){
    var open = settings.classList.toggle("open");
    settingsToggle.textContent = open ? "⚙️ 시간 설정 닫기" : "⚙️ 시간 설정";
  });
  var LIMITS = { focus:[1,90], short:[1,30], long:[5,60] };
  Array.prototype.forEach.call(settings.querySelectorAll(".stepper"), function(st){
    var key = st.getAttribute("data-key");
    var valEl = st.querySelector("[data-val]");
    valEl.textContent = Math.round(dur[key]/60);
    st.querySelectorAll("button").forEach(function(b){
      b.addEventListener("click", function(){
        var d = parseInt(b.getAttribute("data-d"),10);
        var cur = Math.round(dur[key]/60) + d;
        var lim = LIMITS[key];
        cur = Math.max(lim[0], Math.min(lim[1], cur));
        dur[key] = cur*60;
        valEl.textContent = cur;
        // 현재 진행 중이 아니고 해당 구간이면 남은 시간도 갱신
        if(!state.running && state.phase===key){ state.remaining = dur[key]; }
        render(false);
      });
    });
  });

  // ── 미니 창 (Document Picture-in-Picture) ─────────────
  var pipWin = null;     // 열린 PIP 창
  var pipEls = null;     // PIP 내부 요소 참조
  var pipOpacity = loadPipOpacity();   // 미니 창 투명도 (0.25~1)

  function loadPipOpacity(){
    try{ var v=parseFloat(localStorage.getItem("ppomodoro-pip-op")); return (v>=0.25 && v<=1) ? v : 1; }
    catch(e){ return 1; }
  }
  function savePipOpacity(v){ try{ localStorage.setItem("ppomodoro-pip-op", String(v)); }catch(e){} }

  // PIP 지원 브라우저에서만 버튼 노출
  var pipSupported = ("documentPictureInPicture" in window);
  if(pipSupported){ pipBtn.hidden = false; }

  function buildPipContent(win){
    var doc = win.document;
    doc.documentElement.lang = "ko";
    // 폰트
    var f1=doc.createElement("link"); f1.rel="preconnect"; f1.href="https://fonts.googleapis.com"; doc.head.appendChild(f1);
    var f2=doc.createElement("link"); f2.rel="stylesheet";
    f2.href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap"; doc.head.appendChild(f2);
    // 스타일 (창 크기에 따라 글자도 스케일)
    var st=doc.createElement("style");
    st.textContent = ''
      + '*{box-sizing:border-box;margin:0;} html,body{height:100%;}'
      + 'body{font-family:"Gowun Dodum",sans-serif;color:#fff;background:transparent;overflow:hidden;user-select:none;}'
      + '.p-face{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;'
      + '  gap:2vmin;padding:4vmin 4vmin 9vmin;background:#E8493A;transition:background .4s ease,opacity .15s ease;}'
      + 'body[data-phase="short"] .p-face{background:#4FAE78;} body[data-phase="long"] .p-face{background:#F2A93C;}'
      + '.p-badge{font-size:min(7vw,7vh);letter-spacing:.1em;opacity:.9;}'
      + '.p-time{font-family:"Jua",sans-serif;font-size:min(30vw,34vh);line-height:1;'
      + '  font-variant-numeric:tabular-nums;text-shadow:0 2px 0 rgba(0,0,0,.10);}'
      + '.p-toggle{font-family:"Jua",sans-serif;font-size:min(8vw,8vh);color:#fff;cursor:pointer;'
      + '  background:rgba(255,255,255,.22);border:none;border-radius:999px;padding:1.4vmin 6vmin;'
      + '  transition:background .15s ease;}'
      + '.p-toggle:hover{background:rgba(255,255,255,.34);} .p-toggle:active{transform:translateY(1px);}'
      + '.p-controls{position:fixed;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;'
      + '  gap:7px;padding:5px 12px;}'
      + '.p-controls .ic{font-size:12px;opacity:.75;color:#fff;}'
      + '.p-op{width:62%;max-width:150px;accent-color:#fff;cursor:pointer;}';
    doc.head.appendChild(st);
    // 페이스(타이머 + 일시정지) — 투명도가 적용되는 영역
    var face=doc.createElement("div"); face.className="p-face";
    var badge=doc.createElement("div"); badge.className="p-badge";
    var time=doc.createElement("div"); time.className="p-time";
    var btn=doc.createElement("button"); btn.className="p-toggle"; btn.type="button";
    face.appendChild(badge); face.appendChild(time); face.appendChild(btn);
    // 컨트롤(투명도 슬라이더) — 항상 또렷하게
    var controls=doc.createElement("div"); controls.className="p-controls";
    var ic=doc.createElement("span"); ic.className="ic"; ic.textContent="◐";
    var op=doc.createElement("input"); op.type="range"; op.className="p-op";
    op.min="25"; op.max="100"; op.step="5"; op.value=String(Math.round(pipOpacity*100)); op.title="투명도 조절";
    controls.appendChild(ic); controls.appendChild(op);

    doc.body.appendChild(face);
    doc.body.appendChild(controls);

    face.style.opacity = pipOpacity;
    btn.addEventListener("click", toggle);
    op.addEventListener("input", function(){
      pipOpacity = (parseInt(op.value,10)||100)/100;
      face.style.opacity = pipOpacity;
      savePipOpacity(pipOpacity);
    });

    pipEls = { badge:badge, time:time, btn:btn, body:doc.body, face:face };
    updatePip();
  }

  function updatePip(){
    if(!pipEls) return;
    var info = PHASE_INFO[state.phase];
    pipEls.body.setAttribute("data-phase", state.phase);
    pipEls.badge.textContent = info.label;
    pipEls.time.textContent = fmt(state.remaining);
    pipEls.btn.textContent = state.running ? "❚❚" : "▶";
  }

  async function openPip(){
    if(!pipSupported){
      alert("이 브라우저는 미니 창을 지원하지 않아요.\n크롬 또는 엣지 최신 버전에서 사용해 주세요.");
      return;
    }
    if(pipWin){ pipWin.close(); return; }   // 이미 열려 있으면 닫기(토글)
    try{
      pipWin = await documentPictureInPicture.requestWindow({ width:260, height:250 });
    }catch(e){ pipWin=null; return; }
    buildPipContent(pipWin);
    pipBtn.classList.add("on");
    pipBtn.textContent = "🪟 미니 창 닫기";
    pipWin.addEventListener("pagehide", function(){
      pipWin=null; pipEls=null;
      pipBtn.classList.remove("on");
      pipBtn.textContent = "🪟 미니 창으로 띄우기";
    });
  }
  pipBtn.addEventListener("click", openPip);

  // 초기 렌더
  render(false);
})();
</script>
<script>
  // 앱 설치·오프라인 지원 (GitHub Pages 등 http(s) 환경에서 동작)
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").catch(function () {});
    });
  }
</script>
</body>
</html>
